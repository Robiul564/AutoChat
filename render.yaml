services:
  - type: web
    name: autochat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linaraman-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: AUTH_MODE
        value: admin_key
      - key: ADMIN_API_KEY
        generateValue: true
      - key: WEBHOOK_VERIFY_TOKEN
        generateValue: true
      - key: WHATSAPP_SEND_MODE
        value: auto
      - key: WHATSAPP_GRAPH_API_URL
        value: https://graph.facebook.com/v20.0
      - key: AI_MODEL_PROVIDER
        value: auto
      - key: AI_MODEL_NAME
        value: gpt-5.5
      - key: PLATFORM_ADMIN_EMAILS
        value: owner@example.com
      - key: ENABLE_DOCS
        value: false
      - key: ALLOWED_ORIGINS
        value: https://autochat-j39p.onrender.com
      - key: ALLOWED_HOSTS
        value: autochat-j39p.onrender.com,autochat.onrender.com,linaraman.onrender.com,*.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://autochat-j39p.onrender.com
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_EMBEDDED_SIGNUP_CONFIG_ID
        sync: false
      - key: META_GRAPH_API_VERSION
        value: v20.0
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: linaraman-db
    plan: free
